<app-admin-menu></app-admin-menu>
<table class="table table-hover table-dark">
  <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">Username</th>
      <th scope="col">Password</th>
      <th scope="col">FirstName</th>
       <th scope="col">LastName</th>
      <th scope="col">Email</th>
       <th scope="col">Role</th>
        <th>Action</th>

    </tr>
  </thead>
  <tbody *ngFor="let user of users, let i=index">
    <tr>
      <th>{{i+1}}</th>
       <th>{{user.username}}</th>
       <th>{{user.password}}</th>
       <th>{{user.firstName}}</th>
       <th>{{user.lastName}}</th>
       <th>{{user.email}}</th>
       <th>{{user.role}}</th>

      <th> <button  (click)="deleteUser(user.username)" class="btn btn-danger">Delete</button>
       &nbsp;
       <a [routerLink]="['/edit-users', user.username]" class="btn btn-primary">Edit</a>

       </th>
    </tr>



  </tbody>
</table>
