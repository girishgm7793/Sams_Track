<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add User Form</title>
    <!-- Bootstrap 5.3.3 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous">

  </head>
  <body>
    <div class="container">
      <div class="form-container">
        <h2 class="form-title">Update User</h2>
        <form [formGroup]="user" (ngSubmit)="updateUser()">
          <div class="row">
            <div class="col-md-6">
              <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username"
                  name="username" formControlName="username"
                  placeholder="Enter username" required>
                <span
                  *ngIf="user.get('username')?.invalid && user.get('username')?.touched">Invalid
                  Username</span>
              </div>
              <div class="mb-3">
                <label for="firstName" class="form-label">First Name</label>
                <input type="text" class="form-control" id="firstName"
                  name="firstName" formControlName="firstName"
                  placeholder="Enter firstName" required>
                <span
                  *ngIf="user.get('firstName')?.invalid && user.get('firstName')?.touched">Invalid
                  firstName</span>
              </div>
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email"
                  formControlName="email" placeholder="Enter Email" required>
                <span
                  *ngIf="user.get('email')?.invalid && user.get('email')?.touched">Invalid
                  Email</span>

              </div>
            </div>
            <div class="col-md-6">
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password"
                  name="password" formControlName="password"
                  placeholder="Enter Password" required>
                <span
                  *ngIf="user.get('password')?.invalid && user.get('password')?.touched">Invalid
                  password</span>

              </div>
              <div class="mb-3">
                <label for="lastName" class="form-label">Last Name</label>
                <input type="text" class="form-control" id="lastName"
                  name="lastName" formControlName="lastName"
                  placeholder="Enter Lastname" required>
                <span
                  *ngIf="user.get('lastName')?.invalid && user.get('lastName')?.touched">Invalid
                  Lastname</span>

              </div>
              <div class="mb-3">
                <label for="role" class="form-label">Role</label>
                <select class="form-select" id="role" name="role"
                  formControlName="role" required>
                  <option value disabled selected>Select a role</option>
                  <option value="admin">Admin</option>
                  <option value="faculty">Faculty</option>

                </select>
                <span
                  *ngIf="user.get('role')?.invalid && user.get('role')?.touched">Select
                  Role</span>

              </div>
            </div>
          </div>
          <div class="text-center">
            <button [disabled]="user.invalid" type="submit" class="btn btn-submit col-12">Update user
             </button>
          </div>
        </form>
      </div>
    </div>
    <!-- Bootstrap 5.3.3 JS (Optional for form interactions) -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"></script>
  </body>
</html>
